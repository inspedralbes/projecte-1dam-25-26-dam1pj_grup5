<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tancar incidència</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <img src="img/logo-pedralbes.jpg" alt="Logo Institut Pedralbes" class="logo">
    </header>

    <main>
        <h1>TANCAR INCIDÈNCIA:</h1>

        <form action="#" method="post" class="formulari-tancar">

            <div class="fila-tancar">
                <div class="camp-tancar">
                    <label for="id_incidencia">ID de la teva incidència:</label>
                    <input type="text" id="id_incidencia" name="id_incidencia" value="XXXXXXXX" required>
                </div>

                <div class="camp-tancar">
                    <label for="descripcio">Descripció de la teva incidència:</label>
                    <input type="text" id="descripcio" name="descripcio" value="XXXXXXX" required>
                </div>

                <div class="camp-tancar">
                    <label for="data_tancament">Data de tancament:</label>
                    <input type="text" id="data_tancament" name="data_tancament" value="28/06/2026" required>
                </div>
            </div>

            <div class="contenidor-boto">
                <button type="submit" class="btn-custom btn-principal btn-gran">
                    TANCAR INCIDÈNCIA
                </button>
            </div>

        </form>
    </main>

</body>
</html>
