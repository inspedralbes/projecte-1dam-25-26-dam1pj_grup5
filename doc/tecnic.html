<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tècnic</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <img src="img/logo-pedralbes.jpg" alt="Logo Institut Pedralbes" class="logo">

        <nav class="rols-botons">
            <a href="index.html" class="btn-custom btn-principal">Tornar a l'inici</a>
        </nav>
    </header>

    <main>
        <h1>QUIN TÈCNIC ES VOL CONNECTAR?</h1>

        <form action="llistat-incidencies.html" method="get" class="form-centre">

            <div class="form-grup">
                <label for="nomTecnic">Posa el teu nom:</label>
                <input type="text" id="nomTecnic" name="nomTecnic" placeholder="Exemple: Aimar" required>
            </div>

            <div class="boto-tornar">
                <button type="submit" class="btn-custom btn-principal btn-gran">
                    LLISTAR LES TEVES INCIDÈNCIES
                </button>
            </div>

        </form>
    </main>

</body>
</html>
