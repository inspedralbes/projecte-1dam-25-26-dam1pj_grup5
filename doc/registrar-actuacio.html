<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar actuació</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <img src="img/logo-pedralbes.jpg" alt="Logo Institut Pedralbes" class="logo">

        <nav class="rols-botons">
            <a href="index.html" class="btn-custom btn-principal">Tornar a l'inici</a>
        </nav>
    </header>

    <main>
        <h1>ACTUACIONS</h1>

        <form action="#" method="post" class="form-centre">

            <div class="form-grup">
                <label for="dataActuacio">Data actuació</label>
                <input type="date" id="dataActuacio" name="dataActuacio" required>
            </div>

            <div class="form-grup">
                <label for="descripcioActuacio">Descripció actuació</label>
                <textarea id="descripcioActuacio" name="descripcioActuacio" rows="5" required></textarea>
            </div>

            <div class="checkbox-grup">
                <label for="visible">Visible la Descripció de l'Actuació</label>
                <input type="checkbox" id="visible" name="visible">
            </div>

            <div class="form-grup">
                <label for="tempsInvertit">Temps invertit (min)</label>
                <input type="text" id="tempsInvertit" name="tempsInvertit" placeholder="5, 10, 15, 30..." required>
            </div>

            <div class="checkbox-grup">
                <label for="finalitzada">Actuació finalitzada</label>
                <input type="checkbox" id="finalitzada" name="finalitzada">
            </div>

            <div class="boto-tornar">
                <button type="submit" class="btn-custom btn-principal">Enviar actuació</button>
            </div>

        </form>
    </main>

</body>
</html>
